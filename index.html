<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmallDay Grid Master Pro</title>
<style>
/* ── Reset & Base ─────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --c-bg:#0a0a0a;
  --c-surface:#111111;
  --c-surface2:#181818;
  --c-border:#222222;
  --c-border2:#2e2e2e;
  --c-text:#e2e2e2;
  --c-muted:#666;
  --c-amber:#f5a623;
  --c-amber-dim:#f5a62322;
  --c-blue:#4a9eff;
  --c-green:#3ecf8e;
  --c-red:#ff4444;
  --c-panel:210px;
  font-family:'SF Pro Display',-apple-system,'Helvetica Neue',Arial,sans-serif;
}
body{background:var(--c-bg);color:var(--c-text);min-height:100vh;overflow-x:hidden}
button{font-family:inherit;cursor:pointer}
input{font-family:inherit}

/* ── Scrollbar ────────────────────────────────────── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#333;border-radius:2px}

/* ── Layout ───────────────────────────────────────── */
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ── Topbar ───────────────────────────────────────── */
.topbar{
  display:flex;align-items:center;gap:16px;
  padding:10px 20px;
  background:var(--c-surface);
  border-bottom:1px solid var(--c-border);
  flex-shrink:0;height:56px;
}
.brand{display:flex;align-items:center;gap:8px;flex-shrink:0}
.brand-mark{width:28px;height:28px;background:var(--c-amber);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#000;letter-spacing:-1px}
.brand-name{font-size:14px;font-weight:600;letter-spacing:-0.3px;color:#fff}
.brand-sub{font-size:10px;color:var(--c-muted);letter-spacing:1px;text-transform:uppercase}
.topbar-sep{width:1px;height:28px;background:var(--c-border2);flex-shrink:0}
.client-field{display:flex;flex-direction:column;gap:2px}
.client-field label{font-size:9px;color:var(--c-muted);letter-spacing:1px;text-transform:uppercase}
.client-field input{
  background:var(--c-surface2);border:1px solid var(--c-border2);
  border-radius:6px;padding:5px 10px;color:var(--c-text);
  font-size:12px;width:180px;outline:none;transition:border-color .15s;
}
.client-field input:focus{border-color:var(--c-amber)}
.topbar-controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ctrl-group{display:flex;align-items:center;gap:6px}
.ctrl-lbl{font-size:10px;color:var(--c-muted);white-space:nowrap}
.range-wrap{display:flex;align-items:center;gap:6px}
.range-val{font-size:11px;color:var(--c-amber);min-width:30px;font-variant-numeric:tabular-nums}
input[type=range]{
  -webkit-appearance:none;appearance:none;
  height:3px;background:#333;border-radius:2px;outline:none;width:90px;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:12px;height:12px;
  border-radius:50%;background:var(--c-amber);cursor:pointer;
}
input[type=range]::-moz-range-thumb{width:12px;height:12px;border-radius:50%;background:var(--c-amber);cursor:pointer;border:none}
input[type=color]{width:28px;height:24px;border:1px solid var(--c-border2);border-radius:5px;cursor:pointer;padding:1px;background:none}
.btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:6px 12px;border-radius:7px;
  border:1px solid var(--c-border2);background:var(--c-surface2);
  color:var(--c-text);font-size:11px;font-weight:500;
  transition:all .15s;white-space:nowrap;
}
.btn:hover{background:#222;border-color:#3a3a3a}
.btn-amber{background:var(--c-amber);border-color:var(--c-amber);color:#000;font-weight:700}
.btn-amber:hover{background:#fdb93a;border-color:#fdb93a}
.btn-red{border-color:#ff444444;color:var(--c-red)}
.btn-red:hover{background:#1a0000}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}

/* ── Global color bar ─────────────────────────── */
.global-bar{
  display:flex;align-items:center;gap:14px;
  padding:7px 20px;
  background:#0f0f0f;
  border-bottom:1px solid var(--c-border);
  flex-shrink:0;flex-wrap:wrap;
}
.global-bar-title{
  font-size:9px;color:var(--c-muted);letter-spacing:1px;
  text-transform:uppercase;white-space:nowrap;flex-shrink:0;
}
.global-bar .ctrl-sep{height:18px}
.gc-val{
  font-size:10px;color:var(--c-amber);
  min-width:28px;text-align:right;
  font-variant-numeric:tabular-nums;
}
.gc-reset{
  font-size:10px;color:var(--c-muted);
  background:none;border:1px solid var(--c-border2);
  border-radius:5px;padding:3px 8px;cursor:pointer;
  transition:all .15s;white-space:nowrap;
}
.gc-reset:hover{color:var(--c-amber);border-color:var(--c-amber);}
/* Double-click-to-reset labels */
.reset-lbl{
  cursor:pointer;user-select:none;
  transition:color .15s;
}
.reset-lbl:hover{color:var(--c-amber)!important;}
/* themed slider tracks */
.gb-slider{width:80px!important}
.bright-trk{background:linear-gradient(to right,#222,#fff)!important}
.contrast-trk{background:linear-gradient(to right,#666,#000 40%,#fff)!important}
.temp-trk{background:linear-gradient(to right,#6ab0ff,#fff 50%,#ffb347)!important}
.sat-trk{background:linear-gradient(to right,#888,#fff 50%,#ff6b6b)!important}

/* ── Upload zone ──────────────────────────────────── */
.upload-area{
  flex:1;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:12px;
  border:2px dashed var(--c-border2);
  border-radius:12px;margin:20px;
  cursor:pointer;transition:all .2s;background:var(--c-surface);
}
.upload-area:hover,.upload-area.drag{border-color:var(--c-amber);background:#0f0d00}
.upload-area p{color:var(--c-muted);font-size:14px}
.upload-area strong{color:var(--c-amber)}
.upload-area small{font-size:11px;color:#444}

/* ── Mobile version tabs (hidden on desktop) ──── */
.ver-tabs{
  display:none; /* shown via media query */
  flex-shrink:0;
  background:var(--c-surface2);
  border-bottom:1px solid var(--c-border);
  padding:0 12px;
  gap:0;
}
.ver-tab-btn{
  flex:1;padding:10px 0;font-size:13px;font-weight:600;
  background:none;border:none;border-bottom:2px solid transparent;
  color:var(--c-muted);cursor:pointer;transition:all .15s;
}
.ver-tab-btn.active{color:var(--c-amber);border-bottom-color:var(--c-amber);}

/* ── Versions grid ────────────────────────────────── */
.versions{
  flex:1;display:grid;grid-template-columns:repeat(3,1fr);
  gap:12px;padding:12px;overflow:hidden;
}
.ver-panel{
  background:var(--c-surface);border:1px solid var(--c-border);
  border-radius:12px;display:flex;flex-direction:column;overflow:hidden;
}
.ver-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;background:var(--c-surface2);border-bottom:1px solid var(--c-border);
  flex-shrink:0;
}
.ver-badge{
  padding:2px 7px;border-radius:4px;font-size:9px;font-weight:800;letter-spacing:1.5px;
}
.ba{background:#f5a62322;color:var(--c-amber);border:1px solid #f5a62344}
.bb{background:#4a9eff22;color:var(--c-blue);border:1px solid #4a9eff44}
.bc{background:#3ecf8e22;color:var(--c-green);border:1px solid #3ecf8e44}
.ver-actions{display:flex;gap:4px}
.icon-btn{
  width:26px;height:26px;border-radius:5px;
  border:1px solid var(--c-border2);background:transparent;
  color:var(--c-muted);font-size:13px;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.icon-btn:hover{background:var(--c-surface2);color:var(--c-text)}
.grid-wrap{flex:1;padding:8px;overflow:hidden;display:flex;align-items:center;justify-content:center}
.photo-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  width:100%;aspect-ratio:1;
}
.ver-foot{padding:8px 10px;border-top:1px solid var(--c-border);flex-shrink:0}
.ver-foot .btn{width:100%;justify-content:center;font-size:11px}

/* ── Grid cell ────────────────────────────────────── */
.cell{
  position:relative;aspect-ratio:1;overflow:hidden;
  cursor:default;
}
.cell.drag-over{box-shadow:inset 0 0 0 2px var(--c-amber)}
.cell.dragging{opacity:.3}
.cell.warn{box-shadow:inset 0 0 0 2px var(--c-red)}
.cell-img-wrap{width:100%;height:100%;overflow:hidden;position:relative;background:#0d0d0d}
.cell-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.cell-img-raw{position:absolute;top:50%;left:50%;transform-origin:center;max-width:none;user-select:none;pointer-events:none;opacity:0}
.cell-overlay{
  position:absolute;inset:0;display:flex;
  align-items:flex-start;justify-content:flex-end;
  padding:3px;pointer-events:none;
}
.cell-tools{pointer-events:all;display:flex;gap:2px;opacity:0;transition:opacity .15s}
.cell:hover .cell-tools{opacity:1}
.c-btn{
  width:20px;height:20px;border-radius:3px;border:none;
  background:rgba(0,0,0,.78);color:#ccc;
  display:flex;align-items:center;justify-content:center;font-size:10px;
  transition:all .12s;
}
.c-btn:hover{background:var(--c-amber);color:#000}
.pin-mark{
  position:absolute;top:3px;left:3px;width:16px;height:16px;
  border-radius:50%;background:var(--c-amber);
  display:flex;align-items:center;justify-content:center;font-size:8px;
  pointer-events:none;
}
.dbl-hint{
  position:absolute;bottom:4px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.7);color:#999;font-size:9px;
  padding:2px 6px;border-radius:3px;white-space:nowrap;
  opacity:0;transition:opacity .15s;pointer-events:none;
}
.cell:hover .dbl-hint{opacity:1}
.empty-cell{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  background:#0d0d0d;font-size:20px;color:#1e1e1e;font-weight:900;
}

/* ── Edit Modal ───────────────────────────────────── */
.modal-bg{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);
  z-index:100;align-items:center;justify-content:center;
}
.modal-bg.open{display:flex}
.modal{
  background:var(--c-surface);border:1px solid var(--c-border2);
  border-radius:16px;width:min(98vw,1020px);height:min(96vh,720px);min-height:580px;
  display:flex;flex-direction:column;overflow:hidden;
  box-shadow:0 40px 100px rgba(0,0,0,.9);
}
.modal-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 18px;border-bottom:1px solid var(--c-border);
  background:var(--c-surface2);flex-shrink:0;
}
.modal-head-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px}
.modal-close{width:28px;height:28px;border-radius:7px;border:1px solid var(--c-border2);background:transparent;color:var(--c-muted);font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.modal-close:hover{background:#222;color:#fff}
.modal-body{display:flex;flex:1;overflow:hidden;min-height:0}

/* viewport */
.edit-vp{
  flex:1;position:relative;background:#080808;
  overflow:hidden;cursor:grab;user-select:none;min-width:0;
}
.edit-vp.pan{cursor:grabbing}
.vp-img{position:absolute;max-width:none;user-select:none;pointer-events:none;transform-origin:center}
.vp-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.vp-lbl{
  position:absolute;font-size:10px;color:var(--c-amber);
  background:rgba(0,0,0,.7);padding:2px 6px;border-radius:3px;
  pointer-events:none;white-space:nowrap;
}

/* side panel */
.edit-side{
  width:240px;flex-shrink:0;background:var(--c-surface2);
  border-left:1px solid var(--c-border);
  display:flex;flex-direction:column;overflow-y:auto;min-height:0;
}
.side-section{padding:14px 16px;border-bottom:1px solid var(--c-border)}
.side-sec-title{font-size:9px;color:var(--c-muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
.side-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.side-row label{font-size:10px;color:var(--c-muted);min-width:40px}
.side-row input[type=range]{flex:1;width:auto}
.side-val{font-size:10px;color:var(--c-amber);min-width:36px;text-align:right;font-variant-numeric:tabular-nums}
.side-btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px}
.side-btn{padding:5px 8px;border-radius:6px;border:1px solid var(--c-border2);background:var(--c-surface);color:var(--c-text);font-size:10px;transition:all .12s}
.side-btn:hover{background:#222;border-color:#3a3a3a}
.side-stat{display:flex;justify-content:space-between;font-size:10px;margin-bottom:4px}
.side-stat span:first-child{color:var(--c-muted)}
.side-stat span:last-child{color:var(--c-amber);font-variant-numeric:tabular-nums}

/* color sliders themed */
.bright-slider::-webkit-slider-thumb{background:#fff}
.bright-slider{background:linear-gradient(to right,#000,#fff)!important}
.contrast-slider::-webkit-slider-thumb{background:#aaa}
.contrast-slider{background:linear-gradient(to right,#888,#000 40%,#fff)!important}
.temp-slider::-webkit-slider-thumb{background:#e8c97a}
.temp-slider{background:linear-gradient(to right,#6ab0ff,#fff 50%,#ffb347)!important}
.sat-slider::-webkit-slider-thumb{background:#ff6b6b}
.sat-slider{background:linear-gradient(to right,#888,#fff 50%,#ff6b6b)!important}

.modal-foot{
  display:flex;gap:8px;padding:10px 18px;
  border-top:1px solid var(--c-border);background:var(--c-surface2);flex-shrink:0;
}
.modal-foot .btn{flex:1;justify-content:center}

/* ── Toast ────────────────────────────────────────── */
.toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:var(--c-surface2);border:1px solid #f5a62333;color:var(--c-amber);
  padding:8px 18px;border-radius:8px;font-size:12px;
  z-index:9999;opacity:0;transition:opacity .25s;pointer-events:none;
}
.toast.show{opacity:1}

/* ── Export progress ──────────────────────────────── */
.exp-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);
  z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:16px;
}
.exp-overlay.open{display:flex}
.exp-box{background:var(--c-surface2);border:1px solid var(--c-border2);border-radius:12px;padding:28px 36px;text-align:center;min-width:260px}
.exp-title{font-size:14px;font-weight:600;margin-bottom:12px}
.exp-bar-wrap{background:#222;border-radius:4px;height:4px;overflow:hidden;margin-bottom:8px}
.exp-bar{height:100%;background:var(--c-amber);border-radius:4px;transition:width .1s;width:0%}
.exp-status{font-size:11px;color:var(--c-muted)}

/* ── Preview overlay (long-press to save on mobile) ── */
.preview-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.96);
  z-index:300;flex-direction:column;
  align-items:stretch;
}
.preview-overlay.open{display:flex}
.preview-topbar{
  width:100%;display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;flex-shrink:0;
}
.preview-title{font-size:13px;font-weight:600;color:#fff;}
.preview-hint{
  font-size:11px;color:var(--c-amber);
  padding:6px 14px;border-radius:20px;
  border:1px solid #f5a62344;background:#f5a62310;
  text-align:center;flex-shrink:0;margin:0 16px 10px;
}
.preview-scroll{
  flex:1;overflow-y:auto;
  display:flex;flex-direction:column;gap:20px;
  padding:0 12px 20px;
  -webkit-overflow-scrolling:touch;
}
.preview-item{
  display:flex;flex-direction:column;gap:8px;
  align-items:center;
}
.preview-item-label{
  font-size:11px;color:var(--c-muted);letter-spacing:1px;text-transform:uppercase;
  align-self:flex-start;
}
.preview-item img{
  width:100%;border-radius:8px;
  display:block;
  /* Enable long-press save on iOS */
  -webkit-touch-callout:default;
  user-select:none;
  cursor:pointer;
}
.preview-item-actions{
  display:flex;gap:8px;width:100%;
}
.preview-item-actions .btn{flex:1;justify-content:center;font-size:12px;}

@media(max-width:900px){
  .versions{grid-template-columns:1fr;overflow-y:auto;}
}

@media(max-width:600px){
  .topbar{height:auto;flex-wrap:wrap;gap:8px;padding:8px 12px;}
  .topbar-controls{gap:8px;}
  .topbar-right{gap:6px;flex-wrap:wrap;}
  .brand-sub{display:none;}
  .client-field input{width:130px;}
  .global-bar{gap:8px;padding:6px 12px;flex-wrap:wrap;}
  .gb-slider{width:60px!important;}
  /* Show tab bar */
  .ver-tabs{display:flex!important;}
  /* Versions becomes single-panel */
  .versions{grid-template-columns:1fr;overflow-y:auto;}
  /* Modal full-screen */
  .modal{width:100vw;height:100dvh;border-radius:0;min-height:0;}
  .modal-body{flex-direction:column;}
  .edit-side{width:100%;border-left:none;border-top:1px solid var(--c-border);max-height:45vh;overflow-y:auto;}
  .edit-vp{min-height:220px;}
}
</style>
</head>
<body>
<div class="app">

<!-- ── Topbar ──────────────────────────────────────── -->
<div class="topbar">
  <div class="brand">
    <div class="brand-mark">小</div>
    <div><div class="brand-name">SmallDay</div><div class="brand-sub">Grid Master Pro</div></div>
  </div>
  <div class="topbar-sep"></div>
  <div class="client-field">
    <label>客戶姓名</label>
    <input type="text" id="clientName" placeholder="輸入姓名（選填）">
  </div>
  <div class="topbar-sep"></div>
  <div class="topbar-controls">
    <div class="ctrl-group">
      <span class="ctrl-lbl">間距</span>
      <div class="range-wrap">
        <input type="range" id="gapSlider" min="0" max="100" value="1" oninput="updateGap(this.value)">
        <span class="range-val" id="gapVal">1px</span>
      </div>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-lbl">底色</span>
      <input type="color" id="bgColor" value="#ffffff" onchange="updateBg(this.value)">
    </div>
    <button class="btn" onclick="randomAll()">⟳ 全部版本換位</button>
  </div>
  <div class="topbar-right">
    <button class="btn" onclick="triggerImportGrid()" style="border-color:#a78bfa66;color:#a78bfa;" title="上傳一張已排好的九宮格圖，自動切割成9張並載入">⬆ 匯入九宮格圖</button>
    <input type="file" id="importGridInput" accept="image/*" style="display:none" onchange="handleImportGrid(this.files)">
    <button class="btn btn-amber" onclick="triggerUpload()">＋ 上傳照片</button>
    <input type="file" id="fileInput" accept="image/*" multiple style="display:none" onchange="handleFiles(this.files)">
    <input type="file" id="replaceInput" accept="image/*" style="display:none" onchange="handleReplaceFile(this.files)">
    <button class="btn" onclick="exportAll()" style="border-color:#f5a62366;color:var(--c-amber)">↓ 導出全部 A·B·C</button>
    <button class="btn btn-red" onclick="clearAll()">✕ 清除</button>
  </div>
</div>

<!-- ── Global Color Bar ────────────────────────── -->
<div class="global-bar" id="globalBar">
  <span class="global-bar-title">全域調色</span>
  <div class="ctrl-group">
    <span class="ctrl-lbl reset-lbl" ondblclick="resetGlobalOne('bright')" title="雙擊歸零">亮度</span>
    <input type="range" class="gb-slider bright-trk" id="gbBright" min="-100" max="100" value="0" step="1" oninput="onGlobalColor('bright',this.value)">
    <span class="gc-val" id="gvBright">0</span>
  </div>
  <div class="ctrl-sep"></div>
  <div class="ctrl-group">
    <span class="ctrl-lbl reset-lbl" ondblclick="resetGlobalOne('contrast')" title="雙擊歸零">對比</span>
    <input type="range" class="gb-slider contrast-trk" id="gbContrast" min="-100" max="100" value="0" step="1" oninput="onGlobalColor('contrast',this.value)">
    <span class="gc-val" id="gvContrast">0</span>
  </div>
  <div class="ctrl-sep"></div>
  <div class="ctrl-group">
    <span class="ctrl-lbl reset-lbl" ondblclick="resetGlobalOne('temp')" title="雙擊歸零">白平衡</span>
    <input type="range" class="gb-slider temp-trk" id="gbTemp" min="-100" max="100" value="0" step="1" oninput="onGlobalColor('temp',this.value)">
    <span class="gc-val" id="gvTemp">0</span>
  </div>
  <div class="ctrl-sep"></div>
  <div class="ctrl-group">
    <span class="ctrl-lbl reset-lbl" ondblclick="resetGlobalOne('sat')" title="雙擊歸零">飽和度</span>
    <input type="range" class="gb-slider sat-trk" id="gbSat" min="-100" max="100" value="0" step="1" oninput="onGlobalColor('sat',this.value)">
    <span class="gc-val" id="gvSat">0</span>
  </div>
  <button class="gc-reset" onclick="resetGlobalColor()">↺ 重設</button>
</div>

<script>
'use strict';
// ══════════════════════════════════════════════
// Constants
// ══════════════════════════════════════════════
const VER_NAMES = ['A','B','C'];
const VER_BADGES = ['ba','bb','bc'];
const STORAGE_KEY = 'sdgm_pro_v6';
const EXPORT_SIZE = 3600;

// ══════════════════════════════════════════════
// State
// ══════════════════════════════════════════════
function mkTr(){ return {scale:1,x:0,y:0,rot:0,fitted:false,bright:0,contrast:0,temp:0,sat:0}; }
function mk3x9(fn){ return Array.from({length:3},()=>Array.from({length:9},fn)); }

let ST = {
  clientName:'',
  gap:1,
  bgColor:'#ffffff',
  globalColor:{ bright:0, contrast:0, temp:0, sat:0 },
  images:[],
  versions: VER_NAMES.map(()=>({
    order:[0,1,2,3,4,5,6,7,8],
    pins:[false,false,false,false,false,false,false,false,false]
  })),
  transforms: mk3x9(mkTr)
};

let dragSrc = null;
let ED = null; // editor context
let vpPanning = false;
let vpPanStart = {};

// ══════════════════════════════════════════════
// Persistence
// ══════════════════════════════════════════════
function stateSave(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(ST)); }catch(e){}
}
function stateLoad(){
  try{
    const r = localStorage.getItem(STORAGE_KEY);
    if(!r) return;
    const p = JSON.parse(r);
    ST.clientName = p.clientName||'';
    ST.gap = p.gap??1;
    ST.bgColor = p.bgColor||'#ffffff';
    ST.versions = p.versions||ST.versions;
    ST.transforms = p.transforms||ST.transforms;
    ST.images = p.images||[];
    ST.globalColor = p.globalColor||{bright:0,contrast:0,temp:0,sat:0};
  }catch(e){}
}

// ══════════════════════════════════════════════
// Init
// ══════════════════════════════════════════════
function init(){
  stateLoad();
  document.getElementById('clientName').value = ST.clientName;
  document.getElementById('gapSlider').value = ST.gap;
  document.getElementById('gapVal').textContent = ST.gap+'px';
  document.getElementById('bgColor').value = ST.bgColor;
  document.getElementById('clientName').addEventListener('input',e=>{ST.clientName=e.target.value;stateSave();});
  // Restore global color bar
  const gc = ST.globalColor;
  document.getElementById('gbBright').value   = gc.bright;   document.getElementById('gvBright').textContent   = gc.bright;
  document.getElementById('gbContrast').value = gc.contrast; document.getElementById('gvContrast').textContent = gc.contrast;
  document.getElementById('gbTemp').value     = gc.temp;     document.getElementById('gvTemp').textContent     = gc.temp;
  document.getElementById('gbSat').value      = gc.sat||0;   document.getElementById('gvSat').textContent      = gc.sat||0;
  if(ST.images.length) renderVersions();
}

// ══════════════════════════════════════════════
// Controls
// ══════════════════════════════════════════════
function updateGap(v){
  ST.gap=+v;
  document.getElementById('gapVal').textContent=v+'px';
  VER_NAMES.forEach((_,vi)=>{
    const g=document.getElementById('grid-'+vi);
    if(g){g.style.gap=v+'px';g.style.padding=v+'px';}
  });
  stateSave();
}
function updateBg(v){
  ST.bgColor=v;
  VER_NAMES.forEach((_,vi)=>{
    const g=document.getElementById('grid-'+vi);
    if(g) g.style.background=v;
  });
  stateSave();
}

// ── Global color adjustments ──────────────────
function onGlobalColor(key, v){
  ST.globalColor[key] = +v;
  document.getElementById('gv'+cap(key)).textContent = v;
  // Re-render all cell canvases to reflect new global color
  VER_NAMES.forEach((_,vi)=>{
    for(let ci=0;ci<9;ci++) renderCellCanvas(vi,ci);
  });
  stateSave();
}
function resetGlobalColor(){
  ST.globalColor = {bright:0,contrast:0,temp:0,sat:0};
  ['Bright','Contrast','Temp','Sat'].forEach(k=>{
    const id='gb'+k; const el=document.getElementById(id);
    if(el){ el.value=0; document.getElementById('gv'+k).textContent=0; }
  });
  VER_NAMES.forEach((_,vi)=>{
    for(let ci=0;ci<9;ci++) renderCellCanvas(vi,ci);
  });
  stateSave();
}

// ══════════════════════════════════════════════
// Upload
// ══════════════════════════════════════════════
function triggerUpload(){ document.getElementById('fileInput').click(); }
function onDragOver(e){ e.preventDefault(); document.getElementById('uploadArea').classList.add('drag'); }
function onDragLeave(){ document.getElementById('uploadArea').classList.remove('drag'); }
function onDrop(e){ e.preventDefault(); document.getElementById('uploadArea').classList.remove('drag'); handleFiles(e.dataTransfer.files); }
function handleFiles(files){
  const arr = Array.from(files).filter(f=>f.type.startsWith('image/')).slice(0,9);
  if(!arr.length) return;
  ST.images=[];
  ST.transforms=mk3x9(mkTr);
  ST.versions.forEach(v=>{v.order=arr.map((_,i)=>i);v.pins=arr.map(()=>false);});
  let done=0;
  arr.forEach((file,i)=>{
    const r=new FileReader();
    r.onload=ev=>{
      ST.images[i]=ev.target.result;
      if(++done===arr.length){renderVersions();stateSave();}
    };
    r.readAsDataURL(file);
  });
}

// ══════════════════════════════════════════════
// Render
// ══════════════════════════════════════════════
let activeTab = 0;

function switchTab(vi){
  activeTab = vi;
  document.querySelectorAll('.ver-tab-btn').forEach((btn,i)=>{
    btn.classList.toggle('active', i===vi);
  });
  // Show only the active ver-panel on mobile
  document.querySelectorAll('.ver-panel').forEach((panel,i)=>{
    panel.style.display = (window.innerWidth<=600 && i!==vi) ? 'none' : '';
  });
}

function renderVersions(){
  const main = document.getElementById('mainArea');
  main.innerHTML='';
  const wrap = document.createElement('div');
  wrap.className='versions';
  VER_NAMES.forEach((_,vi)=>wrap.appendChild(buildPanel(vi)));
  main.appendChild(wrap);
  // Apply mobile tab visibility after render
  if(window.innerWidth<=600) switchTab(activeTab);
}

window.addEventListener('resize',()=>{
  const panels = document.querySelectorAll('.ver-panel');
  if(window.innerWidth>600){
    panels.forEach(p=>p.style.display='');
  } else {
    switchTab(activeTab);
  }
});

function buildPanel(vi){
  const p=document.createElement('div'); p.className='ver-panel';
  p.innerHTML=`
    <div class="ver-head">
      <div style="display:flex;align-items:center;gap:8px">
        <span class="ver-badge ${VER_BADGES[vi]}">版本 ${VER_NAMES[vi]}</span>
        <span style="font-size:11px;color:var(--c-muted)">九宮格排版</span>
      </div>
      <div class="ver-actions">
        <button onclick="randomVer(${vi})" title="此版本隨機換位（不影響其他版本）"
          style="display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:6px;border:1px solid #f5a62388;background:#f5a62318;color:#f5a623;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;letter-spacing:0.3px;"
          onmouseover="this.style.background='#f5a62333'" onmouseout="this.style.background='#f5a62318'">⟳ 換位</button>
        <button class="icon-btn" title="導出" onclick="exportVer(${vi})">↓</button>
      </div>
    </div>
    <div class="grid-wrap">
      <div class="photo-grid" id="grid-${vi}"
        style="gap:${ST.gap}px;padding:${ST.gap}px;background:${ST.bgColor};">
      </div>
    </div>
    <div class="ver-foot">
      <button class="btn btn-amber" onclick="exportVer(${vi})">導出 3600px JPG</button>
    </div>`;
  setTimeout(()=>buildGrid(vi),0);
  return p;
}

function buildGrid(vi){
  const grid=document.getElementById('grid-'+vi);
  if(!grid) return;
  grid.innerHTML='';
  const ver=ST.versions[vi];
  for(let ci=0;ci<9;ci++){
    const cell=document.createElement('div');
    cell.className='cell'; cell.id=`c-${vi}-${ci}`;
    const idx=ver.order[ci]??-1;
    const src=(idx>=0&&ST.images[idx])?ST.images[idx]:null;
    const tr=ST.transforms[vi][ci];
    const pinned=ver.pins[ci];

    if(src){
      const wrap=document.createElement('div'); wrap.className='cell-img-wrap';
      // Use canvas for color adjustments preview
      const canvas=document.createElement('canvas'); canvas.className='cell-canvas'; canvas.id=`cv-${vi}-${ci}`;
      const imgRaw=document.createElement('img'); imgRaw.className='cell-img-raw'; imgRaw.id=`ir-${vi}-${ci}`;
      imgRaw.draggable=false; imgRaw.src=src;
      imgRaw.onload=()=>{
        if(!tr.fitted){
          // tr.scale is a USER multiplier (1.0 = cover fit). Store base separately.
          tr.scale=1.0;
          tr.fitted=true;
        }
        // Use ResizeObserver to render once the canvas has actual dimensions
        const ro=new ResizeObserver(()=>{
          if(wrap.offsetWidth>0){ro.disconnect();renderCellCanvas(vi,ci);}
        });
        ro.observe(wrap);
        if(wrap.offsetWidth>0){ro.disconnect();renderCellCanvas(vi,ci);}
        requestAnimationFrame(()=>checkWarn(cell,canvas,tr));
      };
      wrap.appendChild(canvas); wrap.appendChild(imgRaw); cell.appendChild(wrap);

      // Double-click
      let dclkT=null;
      cell.addEventListener('click',e=>{
        if(e.target.closest('.c-btn')) return;
        if(dclkT){clearTimeout(dclkT);dclkT=null;openEdit(vi,ci);}
        else{dclkT=setTimeout(()=>{dclkT=null;},300);}
      });

      const hint=document.createElement('div'); hint.className='dbl-hint'; hint.textContent='雙擊編輯';
      cell.appendChild(hint);
    }else{
      const emp=document.createElement('div'); emp.className='empty-cell'; emp.textContent=String(ci+1);
      cell.appendChild(emp);
    }

    // Tools
    const ov=document.createElement('div'); ov.className='cell-overlay';
    const tools=document.createElement('div'); tools.className='cell-tools';
    if(src){
      tools.appendChild(mkCBtn('✎','雙擊或點此編輯',e=>{e.stopPropagation();openEdit(vi,ci);}));
      tools.appendChild(mkCBtn('⇄','替換照片',e=>{e.stopPropagation();triggerReplace(vi,ci);}));
    }
    tools.appendChild(mkCBtn('↻','旋轉',e=>{e.stopPropagation();rotCell(vi,ci);}));
    const pb=mkCBtn(pinned?'📌':'○',pinned?'取消釘選':'釘選',e=>{e.stopPropagation();togglePin(vi,ci);});
    tools.appendChild(pb);
    ov.appendChild(tools); cell.appendChild(ov);
    if(pinned){const pm=document.createElement('div');pm.className='pin-mark';pm.textContent='📌';cell.appendChild(pm);}

    setupCellDrag(cell,vi,ci);
    grid.appendChild(cell);
  }
}

function mkCBtn(txt,title,fn){
  const b=document.createElement('button');
  b.className='c-btn';b.textContent=txt;b.title=title;b.onclick=fn;return b;
}

// ══════════════════════════════════════════════
// Canvas cell rendering (with color adjustments)
// ══════════════════════════════════════════════
function renderCellCanvas(vi,ci){
  const canvas=document.getElementById(`cv-${vi}-${ci}`);
  const imgRaw=document.getElementById(`ir-${vi}-${ci}`);
  if(!canvas||!imgRaw||!imgRaw.naturalWidth) return;

  const cell=document.getElementById(`c-${vi}-${ci}`);
  const wrap=cell&&cell.querySelector('.cell-img-wrap');
  if(!wrap) return;

  const W=wrap.offsetWidth||180; const H=wrap.offsetHeight||180;
  if(!W||!H) return;
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);

  const tr=ST.transforms[vi][ci];
  const S=Math.min(W,H); // treat cell as square for clamp (it is 1:1)
  clampTransform(tr, S, imgRaw.naturalWidth, imgRaw.naturalHeight);

  // bs = base cover-fit scale (fills the cell). tr.scale is user multiplier on top.
  const bs=Math.max(W/imgRaw.naturalWidth,H/imgRaw.naturalHeight);
  const sc=bs*(tr.scale||1);

  ctx.save();
  ctx.translate(W/2,H/2);
  ctx.rotate((tr.rot||0)*Math.PI/180);
  ctx.scale(sc,sc);
  ctx.translate(tr.x||0,tr.y||0);
  ctx.drawImage(imgRaw,-imgRaw.naturalWidth/2,-imgRaw.naturalHeight/2);
  ctx.restore();

  const gc = ST.globalColor;
  applyColorFilter(ctx,W,H,
    (tr.bright||0)+(gc.bright||0),
    (tr.contrast||0)+(gc.contrast||0),
    (tr.temp||0)+(gc.temp||0),
    (tr.sat||0)+(gc.sat||0)
  );
  // With clamp enforced, warn border should never appear — but keep check for safety
  requestAnimationFrame(()=>checkWarnCanvas(cell,canvas,tr,W,H));
}

function applyColorFilter(ctx,W,H,bright,contrast,temp,sat){
  if(!bright&&!contrast&&!temp&&!sat) return;
  const idata=ctx.getImageData(0,0,W,H);
  applyColorFilterData(idata,bright,contrast,temp,sat);
  ctx.putImageData(idata,0,0);
}

function checkWarnCanvas(cell,canvas,tr,W,H){
  // Check if rendered image fills entire cell (no black edges)
  const ctx=canvas.getContext('2d');
  const corners=[
    [0,0],[W-1,0],[0,H-1],[W-1,H-1],
    [Math.round(W/2),0],[0,Math.round(H/2)],[W-1,Math.round(H/2)],[Math.round(W/2),H-1]
  ];
  let hasBlack=false;
  for(const[cx,cy]of corners){
    const px=ctx.getImageData(cx,cy,1,1).data;
    if(px[3]===0||(px[0]<5&&px[1]<5&&px[2]<5&&px[3]>0)){hasBlack=true;break;}
  }
  cell.classList.toggle('warn',hasBlack);
}

function checkWarn(cell,canvas,tr){
  setTimeout(()=>{
    const W=canvas.width,H=canvas.height;
    if(!W||!H) return;
    checkWarnCanvas(cell,canvas,tr,W,H);
  },80);
}

// ══════════════════════════════════════════════
// Edit Modal
// ══════════════════════════════════════════════
function openEdit(vi,ci){
  const ver=ST.versions[vi];
  const idx=ver.order[ci]??-1;
  if(idx<0||!ST.images[idx]) return;

  ED={vi,ci,idx,
    orig:{...ST.transforms[vi][ci]},
    wt:{...ST.transforms[vi][ci]}
  };

  document.getElementById('mBadge').className=`ver-badge ${VER_BADGES[vi]}`;
  document.getElementById('mBadge').textContent=`版本 ${VER_NAMES[vi]}`;
  document.getElementById('mLabel').textContent=`第 ${ci+1} 格 · 編輯照片`;

  const vpImg=document.getElementById('vpImg');
  vpImg.onload=()=>{
    document.getElementById('infoSize').textContent=`${vpImg.naturalWidth}×${vpImg.naturalHeight}`;
    layoutVp();
    syncEditUI();
  };
  vpImg.src=ST.images[idx];

  document.getElementById('modalBg').classList.add('open');
  document.body.style.overflow='hidden';

  const vp=document.getElementById('editVp');
  vp.onmousedown=vpMouseDown;
  vp.onwheel=vpWheel;
}

function closeEdit(apply){
  if(apply===true&&ED){
    const editedImgIdx = ED.idx; // the image index being edited
    const newTr = {...ED.wt};

    // Apply to ALL versions that contain this same image
    VER_NAMES.forEach((_,vi)=>{
      const ver = ST.versions[vi];
      ver.order.forEach((imgIdx, ci)=>{
        if(imgIdx === editedImgIdx){
          ST.transforms[vi][ci] = {...newTr};
          renderCellCanvas(vi, ci);
          const cell = document.getElementById(`c-${vi}-${ci}`);
          const canvas = document.getElementById(`cv-${vi}-${ci}`);

// clampTransform: enforce the rotated image ALWAYS covers every pixel of the S×S crop box.
// Strategy: transform the 4 crop-box corners into image-local space (un-rotate),
// then ensure they all fall within the image half-extents. Exact for any rotation.
function clampTransform(tr, S, nw, nh){
  const rot  = (tr.rot || 0) * Math.PI / 180;
  const cosR = Math.cos(rot);
  const sinR = Math.sin(rot);

  // Base cover scale (fills crop box with no rotation, no pan)
  const bs = Math.max(S / nw, S / nh);

  // The 4 corners of the crop box in world space (relative to image centre)
  const hs = S / 2;
  const corners = [[ hs, hs],[-hs, hs],[ hs,-hs],[-hs,-hs]];

  // Step 1: find minimum scale multiplier so all corners can be inside the image
  // At scale m, image half-extents in local space are nw/2 and nh/2.
  // Corner [cx,cy] in image-local space (zero pan): lx = (cx·cosR + cy·sinR)/(bs·m)
  // Need |lx| <= nw/2 => m >= |cx·cosR + cy·sinR| / (bs · nw/2)
  // Similarly for ly.
  let minM = tr.scale || 1;
  for(const [cx, cy] of corners){
    const lxNum = Math.abs(cx * cosR + cy * sinR);
    const lyNum = Math.abs(-cx * sinR + cy * cosR);
    const mFromX = lxNum / (bs * nw / 2);
    const mFromY = lyNum / (bs * nh / 2);
    minM = Math.max(minM, mFromX, mFromY);
  }
  if((tr.scale || 1) < minM) tr.scale = minM;

  const sc = bs * tr.scale;

  // Step 2: clamp pan (tr.x, tr.y in image-local coords) so all corners stay inside image.
  // image-local x of corner = (cx·cosR + cy·sinR)/sc - tr.x  must be in [-nw/2, nw/2]
  // => tr.x in [lx - nw/2, lx + nw/2] for each corner → intersect all ranges.
  let minPx = -Infinity, maxPx = Infinity;
  let minPy = -Infinity, maxPy = Infinity;
  for(const [cx, cy] of corners){
    const lx = ( cx * cosR + cy * sinR) / sc;
    const ly = (-cx * sinR + cy * cosR) / sc;
    minPx = Math.max(minPx, lx - nw / 2);
    maxPx = Math.min(maxPx, lx + nw / 2);
    minPy = Math.max(minPy, ly - nh / 2);
    maxPy = Math.min(maxPy, ly + nh / 2);
  }
  tr.x = Math.max(minPx, Math.min(maxPx, tr.x || 0));
  tr.y = Math.max(minPy, Math.min(maxPy, tr.y || 0));
}

function applyVpTransform(){
  if(!ED) return;
  const tr=ED.wt;
  const img=document.getElementById('vpImg');
  const S=ED._cs||300;
  const nw=img.naturalWidth||1, nh=img.naturalHeight||1;
  clampTransform(tr, S, nw, nh);
  const bs=Math.max(S/nw, S/nh);
  const sc=bs*(tr.scale||1);
  img.style.transform=`translate(-50%,-50%) rotate(${tr.rot}deg) scale(${sc}) translate(${tr.x}px,${tr.y}px)`;
  document.getElementById('vpLbl').style.color='var(--c-amber)';
}

// Color adjustments in viewport (CSS filter for preview, pixel-level for export)
function applyVpColor(){
  if(!ED) return;
  const tr=ED.wt;
  const gc=ST.globalColor;
  const bright  = (tr.bright||0)  + (gc.bright||0);
  const contrast= (tr.contrast||0)+ (gc.contrast||0);
  const temp    = (tr.temp||0)    + (gc.temp||0);
  const sat     = (tr.sat||0)     + (gc.sat||0);
  const br=Math.max(0.01, 1+(bright/100));
  const ct=Math.max(0.01, 1+(contrast/100));
  const sv=Math.max(0, 1+(sat/100));
  const img=document.getElementById('vpImg');
  let filter=`brightness(${br}) contrast(${ct}) saturate(${sv})`;
  if(temp!==0){
    if(temp>0) filter+=` sepia(${Math.min(1,temp/200)}) saturate(${sv*(1+temp/300)})`;
    else filter+=` hue-rotate(${-temp*0.3}deg)`;
  }
  img.style.filter=filter;
}

// ── Fit helpers ──────────────────────────────
// tr.scale is a USER multiplier: 1.0 = "cover fit" (fills cell/crop box exactly)
// base cover scale = max(S/w, S/h). All fit values expressed relative to that.
function getNat(){const i=document.getElementById('vpImg');return{w:i.naturalWidth||1,h:i.naturalHeight||1};}
function fitCover(){ if(!ED) return;ED.wt.scale=1.0;ED.wt.x=0;ED.wt.y=0;syncEditUI();}
function fitContain(){
  if(!ED) return;
  const{w,h}=getNat(),S=ED._cs||300;
  const coverBase=Math.max(S/w,S/h);
  const containAbs=Math.min(S/w,S/h);
  ED.wt.scale=containAbs/coverBase; // multiplier < 1 to shrink to contain
  ED.wt.x=0;ED.wt.y=0;syncEditUI();
}
function fitWidth(){
  if(!ED) return;
  const{w,h}=getNat(),S=ED._cs||300;
  const coverBase=Math.max(S/w,S/h);
  ED.wt.scale=(S/w)/coverBase;ED.wt.x=0;ED.wt.y=0;syncEditUI();
}
function fitHeight(){
  if(!ED) return;
  const{w,h}=getNat(),S=ED._cs||300;
  const coverBase=Math.max(S/w,S/h);
  ED.wt.scale=(S/h)/coverBase;ED.wt.x=0;ED.wt.y=0;syncEditUI();
}

    [ST.transforms[vi][dragSrc.ci],ST.transforms[vi][ci]]=[ST.transforms[vi][ci],ST.transforms[vi][dragSrc.ci]];
    stateSave();buildGrid(vi);dragSrc=null;
  });
}

// ══════════════════════════════════════════════
// Randomize / Clear
// ══════════════════════════════════════════════
function randomVer(vi){
  const ver = ST.versions[vi];
  // Collect free (unpinned) cell indices
  const fi = ver.order.map((_,i) => ver.pins[i] ? null : i).filter(i => i !== null);
  if(fi.length < 2){ showToast('沒有足夠未釘選的格子可以換位'); return; }

  // Shuffle the free slots - swap BOTH order and transforms together
  // so crop/edit settings always follow the image
  for(let i = fi.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    const ci1 = fi[i], ci2 = fi[j];
    // Swap order
    [ver.order[ci1], ver.order[ci2]] = [ver.order[ci2], ver.order[ci1]];
    // Swap transforms so crop settings follow the image
    [ST.transforms[vi][ci1], ST.transforms[vi][ci2]] =
      [ST.transforms[vi][ci2], ST.transforms[vi][ci1]];
  }

  stateSave();
  buildGrid(vi);
}
function randomAll(){ VER_NAMES.forEach((_,vi) => randomVer(vi)); }

  if(!confirm('確定清除所有照片與排版設定？')) return;
  ST.images=[];ST.transforms=mk3x9(mkTr);

}

// Replace photo (syncs across all versions)
// ══════════════════════════════════════════════
let replacingCtx = null;

function triggerReplace(vi, ci){
  const ver = ST.versions[vi];
  const imgIdx = ver.order[ci] ?? -1;
  if(imgIdx < 0){ showToast('此格沒有照片'); return; }
  replacingCtx = { vi, ci, imgIdx };
  const inp = document.getElementById('replaceInput');
  inp.value = '';
  inp.click();
}

function handleReplaceFile(files){
  if(!files||!files.length||!replacingCtx) return;
  const { imgIdx } = replacingCtx;
  const file = files[0];
  if(!file.type.startsWith('image/')){ showToast('請選擇圖片檔案'); return; }
  const reader = new FileReader();
  reader.onload = ev => {
    ST.images[imgIdx] = ev.target.result;
    // Reset transforms + rebuild all cells across all versions using this imgIdx
    const rebuilt = new Set();
    VER_NAMES.forEach((_,vi2) => {
      let needRebuild = false;
      ST.versions[vi2].order.forEach((idx, ci2) => {
        if(idx === imgIdx){
          ST.transforms[vi2][ci2] = mkTr();
          needRebuild = true;
        }
      });
      if(needRebuild && !rebuilt.has(vi2)){
        buildGrid(vi2);
        rebuilt.add(vi2);
      }
    });
    stateSave();
    showToast('✓ 照片已替換並同步至所有版本');
    replacingCtx = null;
  };
  reader.readAsDataURL(file);
}

// ══════════════════════════════════════════════
// Shared export core (returns a Promise<Blob>)
// ══════════════════════════════════════════════
async function renderVersionToBlob(vi, onProgress){
  const SIZE = EXPORT_SIZE;
  const gp = Math.round((ST.gap / 300) * SIZE);
  const cp = Math.round((SIZE - gp * 4) / 3);
  const cv = document.createElement('canvas');
  cv.width = cv.height = SIZE;
  const ctx = cv.getContext('2d');
  ctx.fillStyle = ST.bgColor;
  ctx.fillRect(0, 0, SIZE, SIZE);
  const ver = ST.versions[vi];
  const loadImg = src => new Promise((res,rej)=>{
    const img = new Image(); img.crossOrigin='anonymous';
    img.onload=()=>res(img); img.onerror=rej; img.src=src;
  });
  for(let ci = 0; ci < 9; ci++){
    onProgress && onProgress(Math.round((ci/9)*80), `版本 ${VER_NAMES[vi]} · 第 ${ci+1}/9 格`);
    await new Promise(r=>setTimeout(r,8));
    const idx = ver.order[ci];
    if(idx===undefined||!ST.images[idx]) continue;
    const col=ci%3, row=Math.floor(ci/3);
    const x=gp+col*(cp+gp), y=gp+row*(cp+gp);
    let img; try{ img=await loadImg(ST.images[idx]); }catch{ continue; }
    const tr = ST.transforms[vi][ci];
    ctx.save();
    ctx.beginPath(); ctx.rect(x,y,cp,cp); ctx.clip();
    ctx.translate(x+cp/2, y+cp/2);
    ctx.rotate((tr.rot||0)*Math.PI/180);
    const bs = Math.max(cp/img.naturalWidth, cp/img.naturalHeight);
    ctx.scale(bs*(tr.scale||1), bs*(tr.scale||1));
    ctx.translate(tr.x||0, tr.y||0);
    ctx.drawImage(img, -img.naturalWidth/2, -img.naturalHeight/2);
    ctx.restore();
    const gc = ST.globalColor;
    const totalB = (tr.bright||0)+(gc.bright||0);
    const totalC = (tr.contrast||0)+(gc.contrast||0);
    const totalT = (tr.temp||0)+(gc.temp||0);
    const totalS = (tr.sat||0)+(gc.sat||0);
    if(totalB||totalC||totalT||totalS){
      onProgress && onProgress(Math.round((ci/9)*80)+5, `版本 ${VER_NAMES[vi]} · 調色第 ${ci+1}/9 格`);
      await new Promise(r=>setTimeout(r,4));
      const cellData = ctx.getImageData(x,y,cp,cp);
      applyColorFilterData(cellData, totalB, totalC, totalT, totalS);
      ctx.putImageData(cellData, x, y);
    }
  }
  onProgress && onProgress(90, `版本 ${VER_NAMES[vi]} · 壓縮中...`);
  await new Promise(r=>setTimeout(r,10));
  return new Promise(res => cv.toBlob(res, 'image/jpeg', 0.95));
}

function downloadBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

  // Title with count
  document.getElementById('previewTitle').textContent =
    blobs.length > 1 ? `預覽 · ${blobs.length} 張（可上下捲動）` : '預覽';

  blobs.forEach((item, i) => {
    const url = URL.createObjectURL(item.blob);
    previewBlobUrls.push(url); // keep alive

    const div = document.createElement('div');
    div.className = 'preview-item';

    const lbl = document.createElement('div');
    lbl.className = 'preview-item-label';
    lbl.textContent = item.label;

    const img = document.createElement('img');
    img.src = url;
    img.alt = item.label;
    img.draggable = false;
    // iOS long-press works naturally on <img> with -webkit-touch-callout:default

    // Long-press hint (mobile only)
    const hint = document.createElement('div');
    hint.textContent = '📱 長按圖片可直接儲存到相冊';
    hint.style.cssText = 'font-size:12px;color:#f5a623;text-align:center;padding:4px 0;display:' + (('ontouchstart' in window)?'block':'none');

    const actions = document.createElement('div');
    actions.className = 'preview-item-actions';

    const hasFinePointer = window.matchMedia('(pointer:fine)').matches;

    const dlBtn = document.createElement('button');
    dlBtn.className = 'btn btn-amber';
    dlBtn.textContent = `↓ 下載 ${item.label}`;
    dlBtn.onclick = () => downloadBlob(item.blob, item.filename);
    // Only show download button on desktop (mouse device)
    if(hasFinePointer) actions.appendChild(dlBtn);

    if(i === blobs.length - 1){
      const closeBtn = document.createElement('button');
      closeBtn.className = 'btn';
      closeBtn.textContent = '關閉';
      closeBtn.onclick = closePreview;
      actions.appendChild(closeBtn);
    }

    div.appendChild(lbl);
    div.appendChild(img);
    div.appendChild(hint);
    div.appendChild(actions);
    scroll.appendChild(div);
  });

  document.getElementById('previewOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  scroll.scrollTop = 0;
}

function closePreview(){
  document.getElementById('previewOverlay').classList.remove('open');
  document.body.style.overflow = '';
  previewBlobUrls.forEach(u=>URL.revokeObjectURL(u));
  previewBlobUrls = [];
  document.getElementById('previewScroll').innerHTML = '';
}

async function exportVer(vi){
  if(!ST.images.length){ showToast('請先上傳照片'); return; }
  const overlay = document.getElementById('expOverlay');
  document.getElementById('expTitle').textContent = `導出版本 ${VER_NAMES[vi]} · 3600×3600px`;
  overlay.classList.add('open');
  setExpProgress(0,'準備中...');
  await new Promise(r=>setTimeout(r,40));
  const blob = await renderVersionToBlob(vi, setExpProgress);
  overlay.classList.remove('open');
  if(!blob){ showToast('導出失敗'); return; }

  const hasFinePointer = window.matchMedia('(pointer:fine)').matches;
  if(hasFinePointer){
    // Desktop: direct download
    downloadBlob(blob, getFileName(vi));
    showToast(`✓ 導出成功 · 版本 ${VER_NAMES[vi]}`);
  } else {
    // Mobile/tablet: show preview for long-press save
    openPreview([{ blob, filename: getFileName(vi), label: `版本 ${VER_NAMES[vi]}` }]);
  }
}

// ══════════════════════════════════════════════
// Export all three versions
// ══════════════════════════════════════════════
async function exportAll(){
  if(!ST.images.length){ showToast('請先上傳照片'); return; }
  const overlay = document.getElementById('expOverlay');
  document.getElementById('expTitle').textContent = '導出全部版本 A · B · C · 3600×3600px';
  overlay.classList.add('open');
  setExpProgress(0,'準備導出三個版本...');
  await new Promise(r=>setTimeout(r,40));

  const blobs = [];
  for(let vi=0; vi<VER_NAMES.length; vi++){
    const baseProgress = Math.round(vi/3*100);
    setExpProgress(baseProgress, `正在渲染版本 ${VER_NAMES[vi]}...`);
    await new Promise(r=>setTimeout(r,60)); // let UI breathe on mobile

    let blob = null;
    try {
      blob = await renderVersionToBlob(vi, (pct, msg)=>{
        setExpProgress(Math.round(baseProgress + pct/3), msg);
      });
    } catch(e) {
      console.error('Export error vi='+vi, e);
    }

    if(!blob){
      overlay.classList.remove('open');
      showToast(`版本 ${VER_NAMES[vi]} 渲染失敗，請試試「逐版本導出」`);
      return;
    }
    blobs.push({ blob, filename: getFileName(vi), label: `版本 ${VER_NAMES[vi]}` });
    // Give mobile GC time between large canvas operations
    await new Promise(r=>setTimeout(r,300));
  }

  setExpProgress(100,`完成！共 ${blobs.length} 張`);
  overlay.classList.remove('open');

  // Use CSS media query to detect true pointer device (mouse = fine, touch = coarse)
  const hasFinePointer = window.matchMedia('(pointer:fine)').matches;
  if(hasFinePointer){
    // Desktop with mouse: directly download all 3
    for(const item of blobs){
      downloadBlob(item.blob, item.filename);
      await new Promise(r=>setTimeout(r,300));
    }
    showToast(`✓ 版本 A、B、C 已全部下載（共 3 張）`);
  } else {
    // Mobile / tablet: show preview for long-press save
    openPreview(blobs);
  }
}

function applyColorFilterData(idata,bright,contrast,temp,sat){
  const d=idata.data;
  const bv=(bright||0)*2.55;
  const cv=(contrast||0)/100;
  const cfactor=(259*(cv*100+255))/(255*(259-cv*100));
  const tw=temp||0;
  const sv=1+(sat||0)/100; // sat multiplier: <1 desaturate, >1 saturate

  for(let i=0;i<d.length;i+=4){
    let r=d[i],g=d[i+1],b=d[i+2];
    // Brightness
    r+=bv; g+=bv; b+=bv;
    // Contrast
    r=cfactor*(r-128)+128;
    g=cfactor*(g-128)+128;
    b=cfactor*(b-128)+128;
    // Temperature: warm→+R−B, cool→−R+B
    r+=tw*0.8; b-=tw*0.8; g+=tw*0.1;
    // Saturation: shift each channel away from/toward luminance
    const lum=0.299*r+0.587*g+0.114*b;
    r=lum+(r-lum)*sv;
    g=lum+(g-lum)*sv;
    b=lum+(b-lum)*sv;
    d[i]  =Math.max(0,Math.min(255,r));
    d[i+1]=Math.max(0,Math.min(255,g));
    d[i+2]=Math.max(0,Math.min(255,b));
  }
}

// Import Grid Image — auto-detect gaps & slice
// ══════════════════════════════════════════════
function triggerImportGrid(){
  const inp = document.getElementById('importGridInput');
  inp.value = '';
  inp.click();
}

function handleImportGrid(files){
  if(!files||!files.length) return;
  const file = files[0];
  if(!file.type.startsWith('image/')){ showToast('請選擇圖片檔案'); return; }

  showToast('正在分析九宮格圖...');

  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      try {
        const slices = sliceGridImage(img);
        if(!slices){ showToast('❌ 無法偵測九宮格間距，請確認圖片格式'); return; }

        // Replace all images and reset everything
        ST.images = slices;
        ST.transforms = mk3x9(mkTr);
        ST.versions = VER_NAMES.map(()=>({
          order:[0,1,2,3,4,5,6,7,8],
          pins:[false,false,false,false,false,false,false,false,false]
        }));
        stateSave();
        renderVersions();
        showToast('✓ 已自動切割並載入 9 張照片');
      } catch(e) {
        showToast('❌ 切割失敗：' + e.message);
      }
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

// Core: load image onto canvas, detect gap rows/cols, extract 9 cells as dataURLs
function sliceGridImage(img){
  const W = img.naturalWidth, H = img.naturalHeight;
  const cv = document.createElement('canvas');
  cv.width = W; cv.height = H;
  const ctx = cv.getContext('2d');
  ctx.drawImage(img, 0, 0);
  const data = ctx.getImageData(0, 0, W, H).data;

  const px = (x, y) => {
    const i = (y * W + x) * 4;
    return [data[i], data[i+1], data[i+2]];
  };

  const TOL = 20; // colour tolerance for "uniform" check

  // Check if a full horizontal row is uniform colour
  const rowUniform = (y) => {
    const [r0,g0,b0] = px(0, y);
    for(let x=1; x<W; x++){
      const [r,g,b] = px(x, y);
      if(Math.abs(r-r0)>TOL||Math.abs(g-g0)>TOL||Math.abs(b-b0)>TOL) return false;
    }
    return true;
  };

  // Check if a full vertical column is uniform colour
  const colUniform = (x) => {
    const [r0,g0,b0] = px(x, 0);
    for(let y=1; y<H; y++){
      const [r,g,b] = px(x, y);
      if(Math.abs(r-r0)>TOL||Math.abs(g-g0)>TOL||Math.abs(b-b0)>TOL) return false;
    }
    return true;
  };

  // Find all contiguous uniform bands, return [{start,end}]
  const findGapBands = (size, checkFn) => {
    const bands = [];
    let inGap = false, start = 0;
    for(let i = 0; i < size; i++){
      if(checkFn(i)){
        if(!inGap){ inGap = true; start = i; }
      } else {
        if(inGap){ inGap = false; bands.push({start, end: i-1}); }
      }
    }
    if(inGap) bands.push({start, end: size-1});
    return bands;
  };

  const hBands = findGapBands(H, rowUniform);
  const vBands = findGapBands(W, colUniform);

  // Separate outer edge bands from inner divider bands.
  // Outer bands: touch the very first or last pixel.
  // Inner bands: the 2 dividers that split the image into 3 columns/rows.
  const outerH = { top: null, bottom: null };
  const outerV = { left: null, right: null };
  const innerH = [];
  const innerV = [];

  for(const b of hBands){
    if(b.start === 0)       outerH.top    = b;
    else if(b.end === H-1)  outerH.bottom = b;
    else                    innerH.push(b);
  }
  for(const b of vBands){
    if(b.start === 0)       outerV.left  = b;
    else if(b.end === W-1)  outerV.right = b;
    else                    innerV.push(b);
  }

  // Need exactly 2 inner dividers in each direction.
  // If more, pick the 2 closest to 1/3 and 2/3 of the *inner* content area.
  const contentTop    = outerH.top    ? outerH.top.end   + 1 : 0;
  const contentBottom = outerH.bottom ? outerH.bottom.start - 1 : H - 1;
  const contentLeft   = outerV.left   ? outerV.left.end  + 1 : 0;
  const contentRight  = outerV.right  ? outerV.right.start - 1 : W - 1;
  const contentH = contentBottom - contentTop + 1;
  const contentW = contentRight  - contentLeft  + 1;

  const pick2 = (bands, contentStart, contentSize) => {
    if(bands.length === 2) return bands;
    if(bands.length < 2)   return null;
    const t1 = contentStart + contentSize / 3;
    const t2 = contentStart + 2 * contentSize / 3;
    const score = b => Math.min(
      Math.abs((b.start+b.end)/2 - t1),
      Math.abs((b.start+b.end)/2 - t2)
    );
    return [...bands].sort((a,b)=>score(a)-score(b)).slice(0,2)
                     .sort((a,b)=>a.start-b.start);
  };

  const hGaps = pick2(innerH, contentTop, contentH);
  const vGaps = pick2(innerV, contentLeft, contentW);
  if(!hGaps || !vGaps) return null;

  // Build the 3 row & col bounds — fully excluding outer padding AND inner dividers
  const rowBounds = [
    { s: contentTop,        e: hGaps[0].start - 1 },
    { s: hGaps[0].end + 1,  e: hGaps[1].start - 1 },
    { s: hGaps[1].end + 1,  e: contentBottom       }
  ];
  const colBounds = [
    { s: contentLeft,       e: vGaps[0].start - 1 },
    { s: vGaps[0].end + 1,  e: vGaps[1].start - 1 },
    { s: vGaps[1].end + 1,  e: contentRight        }
  ];

  // Validate: each cell must be at least 10px in both dimensions
  for(const r of rowBounds) if(r.e - r.s < 10) return null;
  for(const c of colBounds) if(c.e - c.s < 10) return null;

  // Extract 9 cells as JPEG dataURLs (row-major: top-left → bottom-right)
  const slices = [];
  const sliceCanvas = document.createElement('canvas');
  const sliceCtx    = sliceCanvas.getContext('2d');

  for(let row = 0; row < 3; row++){
    for(let col = 0; col < 3; col++){
      const x  = colBounds[col].s;
      const y  = rowBounds[row].s;
      const cw = colBounds[col].e - x + 1;
      const ch = rowBounds[row].e - y + 1;
      sliceCanvas.width  = cw;
      sliceCanvas.height = ch;
      sliceCtx.clearRect(0, 0, cw, ch);
      sliceCtx.drawImage(img, x, y, cw, ch, 0, 0, cw, ch);
      slices.push(sliceCanvas.toDataURL('image/jpeg', 0.95));
    }
  }

  return slices;
}

}
